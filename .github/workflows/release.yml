name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build extension zip
        run: |
          UUID="calendar-colors@hello112334.github.io"
          mkdir -p dist
          zip -r "dist/${UUID}.zip" \
            extension.js \
            prefs.js \
            metadata.json \
            stylesheet.css \
            schemas/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
